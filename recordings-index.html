<style>
  :root {
    --ink: #2b2620;

    --purple-light-bg: #f6ecf5;
    --purple-dark: #4f2a4c;
    --bg: #fffdfa;
    --card: #ffffff;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    margin: 0;
    padding: 24px 16px 60px;
    -webkit-user-select: none;
    user-select: none;
  }
  .wrap { max-width: 860px; margin: 0 auto; }
  h1 { font-size: 22px; margin: 0 0 4px; color: var(--purple); }
  .subtitle { color: var(--muted); font-size: 14px; margin: 0 0 20px; }
  .search-row { position: sticky; top: 0; background: var(--bg); padding: 10px 0 16px; z-index: 5; }
  #search {
    width: 100%; padding: 12px 14px; font-size: 15px;
    border: 1px solid var(--line); border-radius: 8px; outline: none;
    background: var(--card); color: var(--purple);
  }
  #search::placeholder { color: var(--purple); opacity: 1; }
  #search:focus { border-color: var(--accent); }
  .count { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .topics { border-top: 1px solid var(--line); }
  .topic { border-bottom: 1px solid var(--line); }
  .topic-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; padding: 14px 4px; cursor: pointer;
  }
  .topic-name { font-size: 15px; font-weight: 600; }
  .chevron {
    flex-shrink: 0; width: 22px; height: 22px; color: var(--muted);
    transition: transform 0.15s ease;
  }
  .topic.open .chevron { transform: rotate(90deg); }
  .occurrences { display: none; padding: 0 4px 14px; }
  .topic.open .occurrences { display: block; }
  .occ {
    display: flex; gap: 12px; padding: 10px 0 10px 10px;
    border-left: 2px solid var(--line); margin-left: 4px;
  }
  .occ-date { flex-shrink: 0; width: 64px; font-size: 12px; font-weight: 600; color: var(--purple); padding-top: 2px; }
  .occ-body { flex: 1; }
  .watch-link {
    display: inline-block; font-size: 12px; font-weight: 600; color: #fff;
    background: var(--purple); padding: 3px 10px; border-radius: 999px;
    text-decoration: none; margin-bottom: 6px;
  }
  .note { font-size: 13px; line-height: 1.45; margin-top: 4px; color: var(--ink); }
  .note .ts {
    display: inline-block; font-size: 11px; font-weight: 700; color: var(--purple-dark);
    background: var(--purple-light-bg); border-radius: 4px; padding: 1px 6px; margin-right: 6px;
  }
  .empty { padding: 40px 4px; text-align: center; color: var(--muted); font-size: 14px; }
  .note-hit { background: #fff4d6; }
  .note a { color: var(--accent); }
</style>
</head>

rent parts of ourselves that are disassociated or imbalanced. \n41:50 – Doing roles work in WW to address dynamics in relationships \n44:50 – More about why we choose relationships, that might even mirror dysfunctional patterns that were seen in our parents.\n56:33 – Clarification re: being “off balance” and how we might try to find balance in others\n57:20 – Pro tip: A bunch of authority formats is usually required before the system is ready to take in missing pieces"}]}, {"date": "7/11/24", "link": "https://us02web.zoom.us/rec/play/6H5EWq4icaiT4Bo9NcP-SqiQ41N9IhZkVNmyLX_xb3t5VsjP4rdlYD7pvhmabWI7cYtJ7BZ_V76MXOd4.sJ4SPsSS4ocszDKr?canPlayFromShare=true&from=share_recording_detail&continueMode=true&componentName=rec-play&originRequestUrl=https%3A%2F%2Fus02web.zoom.us%2Frec%2Fshare%2FhPIOCj1hqw_XnzHTJ3Z08BWC8jfgrjUKGXnZKZ6QN69ZaMGtUXShEQN7pyquacip.o6JAqwkjZDmQF4Lt", "notes": [{"timestamp": "9:00", "text": "Discussion on relationships and how we can’t change the other person, but change the response to what’s happening."}, {"timestamp": "17:50", "text": "how to handle when someone wants you to work with someone they know, from how to check for where the motivation is coming from to how to empower their other to choose for themselves.\n32:00 – Tamara shares about how to teach NVC (Non-Violent Communication) to clients. \n50:00 How to establish boundaries in a relationship, or establishing an ending to a relationship. Example: how to say feelings in a way that are neutral, speaking about own needs and wants instead of blaming or being critical of the other person. “Embarrassed when I’m out with you and I don’t want to go out with you anymore.” \n54:00 – Important to have boundaries or establish thresholds in relationships. Some people stay no matter what or go from one person to the next to the next.\n57:54 – after you’ve done NVC in a relationship, asking the other, is there anything I can do to make it easier for you to honor my request?\n58:50 – Connirae’s origin of wholeness work story, working with Milton Ericson, at a time when she was trying to decide whether to stay in relationship with Steven. In the end, she knew she would be OK, either way, not matter what, no matter which choice she made."}]}, {"date": "8/8/24", "link": "https://drive.google.com/file/d/1Dni9YU_URdjBGUQQDPMwOryHe1VW4wh3/view", "notes": [{"timestamp": "22:00", "text": "CT and restorative justice. The parts want apologies or get something from a relationship."}]}]}, {"topic": "Religious / Spiritual / Supernatural Beliefs", "occurrences": [{"date": "6/6/24", "link": "https://us02web.zoom.us/rec/play/PpOonxoTK6TaZ9elC_xHFRmBV7IbOj_5f0eopzEccb3FYjEyoAa4i-omRFB9VPQEjRXdTvlXHVm_bejV.RdSrlLLVGQaDsJVz?canPlayFromShare=true&from=share_recording_detail&continueMode=true&componentName=rec-play&originRequestUrl=https%3A%2F%2Fus02web.zoom.us%2Frec%2Fshare%2FauuLcUIG8uX035LBlvyPN1DBRzv8fZEiEj6ooOHIgqlZaj5UxaM0e8EnMdMI3k83.w6CA6SGf7YIIVohi", "notes": [{"timestamp": "17:52", "text": "APP for religious/condemning thoughts? But who is the other? How to identify where the beliefs come from."}, {"timestamp": "20:33", "text": "Discussion of religious beliefs and when you might want to elicit healing and possibly giving the energy back, especially for punishing parts."}]}, {"date": "7/25/24", "link": "https://us02web.zoom.us/rec/play/qydSg6n4z59YrLJtVL83SFPBNUK1Tf0CDP35BAZvEGA4fSnda-m0HpAzEhjYKq68_sW4T4homHmDfuGG.x7wwgsxBTwrUYoio?canPlayFromShare=true&from=share_recording_detail&continueMode=true&componentName=rec-play&originRequestUrl=https%3A%2F%2Fus02web.zoom.us%2Frec%2Fshare%2FR23W7XD4We3qODmH_pKaSyuFgMptfW3tO_hgEPkWiUAMWDuA-cfghKYRab6PwXTs.KP4yiCATchm3IenE", "notes": [{"timestamp": "0:02", "text": "Client says supernatural beings are holding them back. Where do I start with an experience like that?"}, {"timestamp": "0:44", "text": "Spiritual beliefs - when a client has heavy theological positions within their experience."}]}]}, {"topic": "Repeating same starting place", "o /* ============================================================
   Rendering + search — no need to edit below this line.
   ============================================================ */
const topicsEl = document.getElementById('topics');
const emptyEl = document.getElementById('empty');
const searchEl = document.getElementById('search');

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function highlight(text, q) {
  const esc = escapeHtml(text);
  if (!q) return esc;
  const idx = esc.toLowerCase().indexOf(q.toLowerCase());
  if (idx === -1) return esc;
  return esc.slice(0, idx) + '<mark>' + esc.slice(idx, idx + q.length) + '</mark>' + esc.slice(idx + q.length);
}

function topicMatches(topic, q) {
  if (!q) return true;
  const hay = [topic.topic];
  topic.occurrences.forEach(o => {
    hay.push(o.date);
    o.notes.forEach(n => hay.push(n.text));
  });
  return hay.join(' ').toLowerCase().includes(q.toLowerCase());
}

function render(q) {
  const query = (q || '').trim();
  const filtered = TOPICS.filter(t => topicMatches(t, query));
  emptyEl.style.display = filtered.length ? 'none' : 'block';
  topicsEl.innerHTML = '';

  filtered.forEach(t => {
    const div = document.createElement('div');
    div.className = 'topic' + (query ? ' open' : '');

    const occHtml = t.occurrences.map(o => {
      const notesHtml = o.notes.map(n => {
        const tsHtml = n.timestamp ? '<span class="ts">' + escapeHtml(n.timestamp) + '</span>' : '';
        return '<div class="note">' + tsHtml + highlight(n.text, query) + '</div>';
      }).join('');
      return `
        <div class="occ">
          <div class="occ-date">${escapeHtml(o.date)}</div>
          <div class="occ-body">
            <a class="watch-link" href="${escapeHtml(o.link)}" target="_blank" rel="noopener">Watch ↗</a>
            ${notesHtml}
          </div>
        </div>`;
    }).join('');

    div.innerHTML = `
      <div class="topic-head">
        <div>
          <div class="topic-name">${highlight(t.topic, query)}</div>
        </div>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
      </div>
      <div class="occurrences">${occHtml}</div>
    `;

    div.querySelector('.topic-head').addEventListener('click', () => {
      div.classList.toggle('open');
    });

    topicsEl.appendChild(div);
  });
}

searchEl.addEventListener('input', () => render(searchEl.value));

// Light copy deterrent — casual friction only, not real protection.
document.addEventListener('contextmenu', e => e.preventDefault());

render('');
</script>
